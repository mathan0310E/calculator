name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'

      - name: Create Flutter scaffold
        run: |
          rm -rf /tmp/calcpro
          flutter create --org com.calcpro --project-name calc_pro /tmp/calcpro
          rm -rf /tmp/calcpro/lib/*
          cp -r flutter/lib/* /tmp/calcpro/lib/
          cp flutter/pubspec.yaml /tmp/calcpro/pubspec.yaml
          cp flutter/analysis_options.yaml /tmp/calcpro/analysis_options.yaml 2>/dev/null || true

      - name: Install dependencies
        run: flutter pub get
        working-directory: /tmp/calcpro

      - name: Build APK
        run: flutter build apk --release
        working-directory: /tmp/calcpro

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calc-pro-release
          path: /tmp/calcpro/build/app/outputs/flutter-apk/app-release.apk
